<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owl Post 💌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 8px #ff003355; } 50% { text-shadow: 0 0 18px #ff003399; } }
    @keyframes rise { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-140px) scale(0.4); } }
  </style>
</head>
<body>
  <div style="background: #0d0d0d; border-radius: 20px; border: 1.5px solid #8b0000; padding: 2.5rem 2rem 2rem; max-width: 340px; width: 90%; text-align: center; animation: fadeIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; position: relative; overflow: hidden;">

    <div id="spell-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>

    <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #8b0000, #cc0000, #8b0000); border-radius: 20px 20px 0 0;"></div>

    <div style="animation: float 3s ease-in-out infinite; display: inline-block; font-size: 58px; line-height: 1; margin-bottom: 0.5rem;">🪄</div>

    <div style="font-size: 20px; color: #cc0000; margin-bottom: 0.6rem; font-weight: bold;">يا عيوني</div>

    <div style="font-size: 11px; letter-spacing: 3px; color: #8b0000; text-transform: uppercase; margin-bottom: 0.4rem; font-weight: bold;">★ Hogwarts Owl Post ★</div>

    <div style="font-size: 22px; font-weight: bold; color: #cc0000; margin: 0.4rem 0 0.25rem; animation: glow 2s ease-in-out infinite; font-style: italic;">
      "Mischief Managed...<br>but not this heart."
    </div>

    <div style="width: 60px; height: 1px; background: #8b0000; margin: 1rem auto;"></div>

    <div style="font-size: 15px; color: #cccccc; margin-bottom: 0.5rem; line-height: 1.7;">
      I solemnly swear I am up to<br>
      <span style="color: #ff4444; font-weight: bold;">missing you terribly.</span> 🖤
    </div>

    <div style="font-size: 14px; color: #888; margin-bottom: 1.25rem; line-height: 1.6; font-style: italic;">
      Not even a Patronus charm<br>
      could chase away this feeling.
    </div>

    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem;">
      <span style="font-size: 20px; animation: float 1.4s ease-in-out infinite; display: inline-block;">🦅</span>
      <span style="font-size: 20px; animation: float 1.8s ease-in-out infinite; display: inline-block;">⚡</span>
      <span style="font-size: 20px; animation: float 2.2s ease-in-out infinite; display: inline-block;">🕯️</span>
      <span style="font-size: 20px; animation: float 1.6s ease-in-out infinite; display: inline-block;">🖤</span>
    </div>

    <button onclick="castSpell()" style="background: #8b0000; color: #fff; border: 1px solid #cc0000; border-radius: 50px; padding: 0.65rem 1.75rem; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px;">
      Alohomora 💌
    </button>

    <div style="font-size: 14px; color: #888; margin-top: 1rem;">jaden</div>
  </div>

  <script>
    function castSpell() {
      const container = document.getElementById('spell-container');
      const symbols = ['⚡','🖤','✨','🕯️','⭐','🔮','💀','🦅'];
      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          el.style.cssText = `position:absolute; font-size:${16 + Math.random()*20}px; left:${Math.random()*90}%; bottom:8%; animation: rise ${1.2 + Math.random()*1}s ease-out forwards; pointer-events:none;`;
          container.appendChild(el);
          setTimeout(() => el.remove(), 2400);
        }, i * 70);
      }
    }
  </script>
</body>
</html>
